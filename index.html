<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Oracle of Seating</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold-dark: #B8860B;
    --blue: #4a8edd;
    --blue-dark: #1a3a6b;
    --amber: #F5A623;
    --wow-purple: #8B5CF6;
    --wow-gold: #FFB100;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    font-family: 'Cormorant Garamond', serif;
    transition: background 0.8s ease;
  }

  #particles {
    position: fixed; inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Layout ── */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 1.5rem 1.25rem;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  /* ── Intro line ── */
  .oracle-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    opacity: 0.5;
    animation: fadeIn 1s ease 0.1s both;
  }

  /* ── Day display ── */
  .day-display {
    animation: fadeIn 1s ease 0.3s both;
  }
  .day-display .day-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    opacity: 0.6;
  }
  .day-display .day-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 8vw, 4rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.04em;
  }

  /* ── Decorative divider ── */
  .divider {
    width: 60%;
    height: 1px;
    opacity: 0.2;
    animation: fadeIn 1s ease 0.5s both;
  }

  /* ── The Banner ── */
  .banner-wrapper {
    width: 100%;
    padding: 0 0.5rem;
    animation: bannerReveal 0.8s ease 0.6s both;
  }

  .banner {
    position: relative;
    width: 100%;
    padding: 1.75rem 1.5rem;
    border-radius: 16px;
    text-align: center;
    overflow: hidden;
  }

  .banner .shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    animation: shimmer 4s ease-in-out infinite;
  }

  .banner-icon {
    font-size: 2.5rem;
    display: block;
    margin-bottom: 0.5rem;
    line-height: 1;
  }

  .banner-main {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    letter-spacing: 0.03em;
    line-height: 1.15;
    display: block;
  }

  .banner-quip {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    font-weight: 400;
    margin-top: 0.75rem;
    opacity: 0.75;
    line-height: 1.4;
  }

  /* ── Countdown (Friday pre-bar) ── */
  .countdown {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 3vw, 1.3rem);
    margin-top: 0.5rem;
    opacity: 0.8;
    animation: fadeIn 1s ease 0.9s both;
  }
  .countdown-time {
    font-weight: 900;
    font-size: 1.4em;
  }

  /* ── Clock + footer ── */
  .clock {
    font-size: 0.8rem;
    opacity: 0.4;
    animation: fadeIn 1s ease 1s both;
  }
  .footer {
    font-size: 0.65rem;
    opacity: 0.2;
    max-width: 280px;
    line-height: 1.5;
    animation: fadeIn 1s ease 1.2s both;
  }

  /* ════════════════════════════════════
     THEME: WEDNESDAY — Gold
     ════════════════════════════════════ */
  body.wednesday {
    background: radial-gradient(ellipse at 30% 15%, #2d2200 0%, #110d00 55%, #000 100%);
    color: var(--gold);
  }
  body.wednesday .divider { background: var(--gold); }
  body.wednesday .banner {
    background: linear-gradient(160deg, #4a3700, #7a5f00 50%, #4a3700);
    color: #fff8e0;
    border: 1.5px solid rgba(255,215,0,0.5);
    box-shadow: 0 8px 40px rgba(255,215,0,0.15), 0 2px 10px rgba(0,0,0,0.5);
  }
  body.wednesday .banner-main {
    color: #fff;
    text-shadow: 0 0 20px rgba(255,215,0,0.7);
  }

  /* ════════════════════════════════════
     THEME: WEEKDAY — Blue
     ════════════════════════════════════ */
  body.weekday {
    background: radial-gradient(ellipse at 40% 20%, #0c1a30 0%, #060e1c 55%, #000 100%);
    color: #a0c4f0;
  }
  body.weekday .divider { background: var(--blue); }
  body.weekday .banner {
    background: linear-gradient(160deg, #0f2545, #1d4480 50%, #0f2545);
    color: #d8e8ff;
    border: 1.5px solid rgba(74,142,221,0.35);
    box-shadow: 0 8px 40px rgba(74,142,221,0.1), 0 2px 10px rgba(0,0,0,0.5);
  }
  body.weekday .banner-main {
    color: #fff;
    text-shadow: 0 0 15px rgba(74,142,221,0.5);
  }

  /* ════════════════════════════════════
     THEME: FRIDAY BAR — Amber
     ════════════════════════════════════ */
  body.friday-bar {
    background: radial-gradient(ellipse at 50% 30%, #2c1a00 0%, #140c00 55%, #000 100%);
    color: var(--amber);
  }
  body.friday-bar .divider { background: var(--amber); }
  body.friday-bar .banner {
    background: linear-gradient(160deg, #3e2400, #6b4200 50%, #3e2400);
    color: #ffe8c0;
    border: 1.5px solid rgba(245,166,35,0.4);
    box-shadow: 0 8px 40px rgba(245,166,35,0.12), 0 2px 10px rgba(0,0,0,0.5);
  }
  body.friday-bar .banner-main {
    color: #fff;
    text-shadow: 0 0 15px rgba(245,166,35,0.5);
  }
  body.friday-bar .banner-icon {
    animation: beerWobble 1.5s ease-in-out infinite;
  }

  /* ════════════════════════════════════
     THEME: WEEKEND — WoW
     ════════════════════════════════════ */
  body.weekend {
    background: radial-gradient(ellipse at 50% 25%, #1a0a30 0%, #0c0520 55%, #020008 100%);
    color: var(--wow-gold);
  }
  body.weekend .divider { background: var(--wow-purple); }
  body.weekend .banner {
    background: linear-gradient(160deg, #1c0a35, #3a1a70 50%, #1c0a35);
    color: var(--wow-gold);
    border: 1.5px solid rgba(139,92,246,0.4);
    box-shadow: 0 8px 40px rgba(139,92,246,0.15), 0 2px 10px rgba(0,0,0,0.5);
  }
  body.weekend .banner-main {
    font-family: 'Press Start 2P', cursive;
    font-size: clamp(1.1rem, 4vw, 1.8rem);
    line-height: 1.5;
    text-shadow: 0 0 12px rgba(139,92,246,0.7), 0 2px 0 #000;
  }
  body.weekend .banner-icon {
    animation: wowPulse 2.5s ease-in-out infinite;
  }
  .wow-flavor {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.75rem;
    opacity: 0.5;
    margin-top: 0.6rem;
    letter-spacing: 0.05em;
    color: #c4a0ff;
  }

  /* ── Confetti (Wed only) ── */
  .confetti {
    position: fixed;
    z-index: 0;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bannerReveal {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes shimmer {
    0%, 100% { left: -100%; }
    60% { left: 100%; }
  }
  @keyframes beerWobble {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }
  @keyframes wowPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(139,92,246,0.5)); }
    50% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(139,92,246,0.9)); }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(600deg); opacity: 0.3; }
  }

  /* ── Debug Picker ── */
  .debug-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    padding: 0.6rem 0.5rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.35rem;
    border-top: 1px solid rgba(255,255,255,0.1);
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  .debug-bar.open { transform: translateY(0); }

  .debug-bar button {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 0.4rem 0.6rem;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .debug-bar button:hover,
  .debug-bar button.active {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border-color: rgba(255,255,255,0.4);
  }
  .debug-bar button.active {
    box-shadow: 0 0 8px rgba(255,255,255,0.15);
  }

  .debug-toggle {
    position: fixed;
    bottom: 0.6rem; right: 0.6rem;
    z-index: 101;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: #888;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .debug-toggle:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
  .debug-bar.open ~ .debug-toggle { bottom: calc(0.6rem + 56px); }
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="content">
  <div class="oracle-label" id="oracleLabel">The Oracle of Seating</div>

  <div class="day-display">
    <div class="day-label" id="dayLabel">Today is</div>
    <div class="day-name" id="dayName">...</div>
  </div>

  <div class="divider"></div>

  <div class="banner-wrapper">
    <div class="banner" id="banner">
      <div class="shimmer"></div>
      <span class="banner-icon" id="bannerIcon"></span>
      <span class="banner-main" id="bannerMain">...</span>
      <span class="banner-quip" id="bannerQuip"></span>
    </div>
  </div>

  <div class="countdown" id="countdown" style="display:none;"></div>

  <div class="clock" id="clock"></div>
  <div class="footer">Powered by ancient Copenhagen timezone magic<br>Auto-refreshes · No refunds on seating assignments</div>
</div>

<div class="debug-bar" id="debugBar">
  <button data-day="1" data-hour="9">Mon</button>
  <button data-day="2" data-hour="9">Tue</button>
  <button data-day="3" data-hour="9">Wed</button>
  <button data-day="4" data-hour="9">Thu</button>
  <button data-day="5" data-hour="10">Fri AM</button>
  <button data-day="5" data-hour="17">Fri Bar</button>
  <button data-day="6" data-hour="14">Sat</button>
  <button data-day="0" data-hour="14">Sun</button>
  <button data-day="auto" data-hour="auto">Live</button>
</div>
<button class="debug-toggle" id="debugToggle" title="Day preview">🔧</button>

<script>
  // ── Particles ──
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let pts = [];

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener('resize', resize);
  resize();

  function makeParticles(hue, n = 45) {
    pts = Array.from({length: n}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      r: Math.random() * 1.8 + 0.4,
      a: Math.random() * 0.35 + 0.05,
      h: hue + (Math.random() - 0.5) * 25,
    }));
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of pts) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.h},60%,55%,${p.a})`;
      ctx.fill();
    }
    requestAnimationFrame(drawParticles);
  }

  // ── Confetti ──
  let confettiSpawned = false;
  function clearConfetti() {
    document.querySelectorAll('.confetti').forEach(el => el.remove());
    confettiSpawned = false;
  }
  function spawnConfetti() {
    if (confettiSpawned) return;
    confettiSpawned = true;
    const cols = ['#FFD700','#FFA500','#FFE066','#FFEC8B','#DAA520'];
    for (let i = 0; i < 35; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.width = (Math.random() * 7 + 3) + 'px';
      el.style.height = (Math.random() * 7 + 3) + 'px';
      el.style.background = cols[~~(Math.random()*cols.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '1px';
      el.style.animationDuration = (Math.random() * 5 + 7) + 's';
      el.style.animationDelay = (Math.random() * 6) + 's';
      document.body.appendChild(el);
    }
  }

  // ── Data ──
  const daysList = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const quips = {
    1: "Kicking off the week at the bank.",
    2: "Tuesday with the team. Good vibes only.",
    3: "Midweek at NBS. The ritual continues.",
    4: "Thursday with the crew. Almost weekend.",
    5: "Friday with Team 15. Bar countdown initiated.",
    '5bar': "Put down the keyboard. Pick up a cold one.",
    6: "Touch grass? In THIS economy?",
    0: "The real world can wait. Azeroth needs you.",
  };

  // ── Day override ──
  let overrideDay = null;
  let overrideHour = null;

  // ── Main ──
  function update() {
    const cph = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Copenhagen' }));

    const d = overrideDay !== null ? overrideDay : cph.getDay();
    const h = overrideHour !== null ? overrideHour : cph.getHours();
    const m = overrideHour !== null ? 0 : cph.getMinutes();

    // Clock
    const clockLabel = overrideDay !== null ? '⚙ Preview mode' :
      `${cph.toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit',second:'2-digit'})} · København`;
    document.getElementById('clock').textContent = clockLabel;

    // Day
    document.getElementById('dayName').textContent = daysList[d];

    // Reset
    document.body.className = '';
    document.getElementById('countdown').style.display = 'none';
    clearConfetti();

    const icon = document.getElementById('bannerIcon');
    const main = document.getElementById('bannerMain');
    const quip = document.getElementById('bannerQuip');

    if (d === 1 || d === 3) {
      // ── NBS DAYS (Monday & Wednesday) ──
      document.body.classList.add('wednesday');
      const isWed = d === 3;
      document.getElementById('oracleLabel').textContent = isWed
        ? '✦ Midweek at the Bank ✦'
        : '✦ Monday at the Bank ✦';
      icon.textContent = '🏦';
      main.textContent = 'Sit at NBS';
      quip.textContent = quips[d];
      makeParticles(45, 55);
      if (isWed) spawnConfetti();

    } else if (d === 5 && h >= 16) {
      // ── FRIDAY BAR ──
      document.body.classList.add('friday-bar');
      document.getElementById('oracleLabel').textContent = '✦ The Sacred Hour Has Come ✦';
      icon.textContent = '🍺🍻🍺';
      main.textContent = 'Sit at the Friday Bar';
      quip.textContent = quips['5bar'];
      makeParticles(30, 50);

    } else if (d === 0 || d === 6) {
      // ── WEEKEND ──
      document.body.classList.add('weekend');
      document.getElementById('oracleLabel').textContent = '✦ The Dungeon Awaits ✦';
      icon.textContent = '⚔️🐉🛡️';
      main.innerHTML = 'Sit at Home';
      quip.innerHTML = quips[d] + '<span class="wow-flavor">[Raid starts in 15 min — don\'t be late]</span>';
      makeParticles(275, 50);

    } else {
      // ── TEAM 15 WEEKDAY ──
      document.body.classList.add('weekday');
      document.getElementById('oracleLabel').textContent = '✦ Home Base ✦';
      icon.textContent = '💻';
      main.textContent = 'Sit with Team 15';
      quip.textContent = quips[d];
      makeParticles(210, 45);

      // Friday before 16: show countdown
      if (d === 5 && h < 16) {
        const minsLeft = (16 - h - 1) * 60 + (60 - m);
        const hLeft = Math.floor(minsLeft / 60);
        const mLeft = minsLeft % 60;
        const cd = document.getElementById('countdown');
        cd.style.display = 'block';
        cd.innerHTML = `🍺 Friday Bar in <span class="countdown-time">${hLeft}h ${mLeft}m</span>`;
      }
    }
  }

  // ── Debug bar logic ──
  const debugBar = document.getElementById('debugBar');
  const debugToggle = document.getElementById('debugToggle');
  const debugBtns = debugBar.querySelectorAll('button');

  debugToggle.addEventListener('click', () => {
    debugBar.classList.toggle('open');
  });

  debugBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      debugBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const dayVal = btn.dataset.day;
      const hourVal = btn.dataset.hour;

      if (dayVal === 'auto') {
        overrideDay = null;
        overrideHour = null;
      } else {
        overrideDay = parseInt(dayVal);
        overrideHour = parseInt(hourVal);
      }
      update();
    });
  });

  update();
  drawParticles();
  setInterval(update, 30000);
</script>
</body>
</html>
